<!DOCTYPE html>
<html lang="pt">
    <head>
        <title>Contagem</title>
        <script>
            let contador = 0;
            function contar() {
                contador++;
                document.querySelector("h1").innerHTML = contador;
            }
        </script>
    </head>
    <body>
        <h1>0</h1>
        <button onclick="contar()">Contar</button>
    </body>
</html>
