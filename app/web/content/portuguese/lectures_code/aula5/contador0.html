<!DOCTYPE html>
<html lang="pt">
    <head>
        <title>Contagem</title>
        <script>
            let contador = 0;
            function contar() {
                contador++;
                alert(contador);
            }
        </script>
    </head>
    <body>
        <button onclick="contar()">Contar</button>
    </body>
</html>
