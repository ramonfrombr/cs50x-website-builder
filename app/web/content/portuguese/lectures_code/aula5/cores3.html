<!DOCTYPE html>
<html lang="pt">
    <head>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                // Alterar a cor do título quando a seleção no dropdown muda
                document.querySelector("#selecao-de-cor").onchange =
                    function () {
                        document.querySelector("#ola").style.color = this.value;
                    };
            });
        </script>
        <title>Cores</title>
    </head>
    <body>
        <h1 id="ola">Olá!</h1>
        <select id="selecao-de-cor">
            <option value="black">Preto</option>
            <option value="red">Vermelho</option>
            <option value="blue">Azul</option>
            <option value="green">Verde</option>
        </select>
    </body>
</html>
