<!DOCTYPE html>
<html lang="pt">
    <head>
        <title>Olá!</title>
        <script>
            function ola() {
                const cabecalho = document.querySelector("h1");
                if (cabecalho.innerHTML === "Olá!") {
                    cabecalho.innerHTML = "Adeus!";
                } else {
                    cabecalho.innerHTML = "Olá!";
                }
            }
        </script>
    </head>
    <body>
        <h1>Olá!</h1>
        <button onclick="ola()">Clique Aqui</button>
    </body>
</html>
