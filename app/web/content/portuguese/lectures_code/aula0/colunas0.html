<!DOCTYPE html>
<html lang="pt">
    <head>
        <title>Minha Página Web!</title>
        <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
            integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
            crossorigin="anonymous"
        />
        <style>
            .row > div {
                padding: 20px;
                background-color: teal;
                border: 2px solid black;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-3">Esta é uma seção.</div>
                <div class="col-3">Esta é mais uma seção.</div>
                <div class="col-3">Esta é uma terceira seção.</div>
                <div class="col-3">Esta é uma quarta seção.</div>
            </div>
        </div>
    </body>
</html>
